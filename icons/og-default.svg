<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#12151A"/>
  <rect x="0" y="580" width="1200" height="50" fill="#D9FE06"/>
  <!-- Grid pattern subtle background -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>
  <!-- Logo icon -->
  <g transform="translate(520, 140)" fill="none" stroke="#D9FE06" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="30" height="30" rx="4"/>
    <rect x="42" y="0" width="30" height="30" rx="4"/>
    <rect x="0" y="42" width="30" height="30" rx="4"/>
    <rect x="42" y="42" width="30" height="30" rx="4"/>
    <rect x="84" y="0" width="30" height="30" rx="4"/>
    <rect x="84" y="42" width="30" height="30" rx="4"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="800" fill="#FFFFFF">Teamz Lab Tools</text>
  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">700+ Free Browser Tools — No Login, No Data Collection</text>
  <!-- URL -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#D9FE06">tool.teamzlab.com</text>
  <!-- Categories -->
  <g transform="translate(600, 480)" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">
    <text x="0" y="0">AI  •  Dev  •  Finance  •  Career  •  Health  •  Sports  •  Creator  •  Student</text>
  </g>
</svg>
