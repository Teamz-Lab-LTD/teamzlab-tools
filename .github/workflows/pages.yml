name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout branding submodule only
        run: git submodule update --init branding

      - name: Regenerate mobile app manifests
        # Safety net: even if a commit bypasses the pre-commit hook
        # (--no-verify), CI rebuilds the mobile app's registries before
        # publishing. This guarantees both files deployed to GitHub Pages
        # always reflect the current tool tree:
        #   - tools.json / tools-debug.json — the mobile app's tool registry
        #     (toss_app fetches on launch; new tools appear without app
        #     release)
        #   - webview-incompat.json — WebView redirect list (auth,
        #     WebAuthn, ffmpeg, transformers, screen-capture, hardware APIs,
        #     heavy assets; flagged tools open in Safari/Chrome instead of
        #     the in-app WebView)
        # build-tools-json runs first so webview-incompat scans the fresh list.
        run: |
          python3 scripts/build-tools-json.py
          python3 scripts/build-webview-incompat.py

      - name: Prepare site directory
        # Copy only the static site files to a clean staging dir.
        # Excludes: private submodule, runtime logs, SEO logs, build scripts, Python cache.
        # This prevents tar "file changed during archive" race conditions from log rotation,
        # and keeps the GitHub Pages artifact lean (HTML/CSS/JS/assets only).
        run: |
          mkdir -p /tmp/site
          rsync -a --no-links \
            --exclude='.git' \
            --exclude='teamz-company-automation' \
            --exclude='logs/' \
            --exclude='seo-logs/' \
            --exclude='scripts/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='*.sh' \
            --exclude='*.py' \
            --exclude='.env' \
            --exclude='.env.*' \
            . /tmp/site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
