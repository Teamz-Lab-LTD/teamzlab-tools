name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout branding submodule only
        run: git submodule update --init branding

      - name: Prepare site directory
        # Copy only the static site files to a clean staging dir.
        # Excludes: private submodule, runtime logs, SEO logs, build scripts, Python cache.
        # This prevents tar "file changed during archive" race conditions from log rotation,
        # and keeps the GitHub Pages artifact lean (HTML/CSS/JS/assets only).
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git' \
            --exclude='teamz-company-automation' \
            --exclude='logs/' \
            --exclude='seo-logs/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            . /tmp/site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
